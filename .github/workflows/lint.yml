name: checks
on:
    pull_request:
    workflow_dispatch:

jobs:
    setup:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: "Set up Python"
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
              with:
                  python-version-file: "pyproject.toml"
            - name: Install uv
              uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
              with:
                  enable-cache: true
                  version: 0.8.*
            - name: Install dependencies
              run: uv sync --locked
            - name: Cache dependencies
              uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: |
                      .venv
                      ~/.cache/uv
                  key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

    lint:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: "Set up Python"
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
              with:
                  python-version-file: "pyproject.toml"
            - name: Install uv
              uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
              with:
                  enable-cache: true
                  version: 0.8.*
            - name: Restore dependencies
              uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: |
                      .venv
                      ~/.cache/uv
                  key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
                  fail-on-cache-miss: true
            - name: Run linting
              run: |
                  uv run ruff check 

    typecheck:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: "Set up Python"
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
              with:
                  python-version-file: "pyproject.toml"
            - name: Install uv
              uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
              with:
                  enable-cache: true
                  version: 0.8.*
            - name: Restore dependencies
              uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: |
                      .venv
                      ~/.cache/uv
                  key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
                  fail-on-cache-miss: true
            - name: Run type checking
              run: uv run ty check
    vulture:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: "Set up Python"
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
              with:
                  python-version-file: "pyproject.toml"
            - name: Install uv
              uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
              with:
                  enable-cache: true
                  version: 0.8.*
            - name: Restore dependencies
              uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: |
                      .venv
                      ~/.cache/uv
                  key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
                  fail-on-cache-miss: true
            - name: Run vulture
              run: uv run vulture .

